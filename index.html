<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Babydoll 🌸</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  color: white;

  /* 💜 plus de mauve + bleu doux */
  background: linear-gradient(135deg, #c77dff, #b8c0ff, #a2d2ff);
}

/* glow */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
  animation: glow 10s infinite linear;
  z-index: 0;
}

@keyframes glow {
  0% { transform: translate(-20%, -20%); }
  50% { transform: translate(20%, 20%); }
  100% { transform: translate(-20%, -20%); }
}

.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  font-size: 38px;
  margin-bottom: 25px;
}

/* boutons */
.buttons {
  display: flex;
  gap: 20px;
  position: relative;
}

button {
  padding: 15px 25px;
  font-size: 16px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.yes-btn {
  position: relative;
  background: white;
  color: purple;
}

.no-btn {
  background: #ffe066;
  color: #6a1b9a;
}

.message {
  margin-top: 30px;
  font-size: 22px;
  font-weight: bold;
}

.party {
  font-size: 40px;
  margin-top: 10px;
  animation: pop 0.6s infinite alternate;
}

@keyframes pop {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* fleurs */
.flower {
  position: fixed;
  top: -40px;
  font-size: 24px;
  animation: fall linear infinite;
  opacity: 0.9;
  z-index: 1;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<div id="flowers"></div>

<div class="container">
  <h1>Will you cry on your birthday babydoll ?</h1>

  <div class="buttons">
    <button class="yes-btn" id="yesBtn">Yes</button>
    <button class="no-btn" onclick="showNo()">No</button>
  </div>

  <div class="message" id="message"></div>
  <div class="party" id="party"></div>
</div>

<audio id="bgMusic" src="music.mp3"></audio>

<script>

// 🎯 bouton YES qui fuit MAIS reste visible
const yesBtn = document.getElementById("yesBtn");

yesBtn.addEventListener("mouseover", () => {
  yesBtn.style.position = "absolute";

  const margin = 20; // marge sécurité

  const maxX = window.innerWidth - yesBtn.offsetWidth - margin;
  const maxY = window.innerHeight - yesBtn.offsetHeight - margin;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  yesBtn.style.left = x + "px";
  yesBtn.style.top = y + "px";
});

// bloque clic
yesBtn.addEventListener("click", (e) => {
  e.preventDefault();
});

// bouton NO
function showNo() {
  document.getElementById("message").textContent = "that's what I want to hear";
  document.getElementById("party").textContent = "🎉🥳🎂💜";

  document.getElementById("bgMusic").play().catch(()=>{});
}

// fleurs
const flowers = document.getElementById("flowers");
const emojis = ["🌸","🌷","🌺","💮","🌼","💜"];

for (let i = 0; i < 40; i++) {
  const f = document.createElement("div");
  f.className = "flower";
  f.textContent = emojis[Math.floor(Math.random()*emojis.length)];

  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (5 + Math.random()*8) + "s";
  f.style.animationDelay = Math.random()*5 + "s";
  f.style.fontSize = (16 + Math.random()*24) + "px";

  flowers.appendChild(f);
}

</script>

</body>
</html>
