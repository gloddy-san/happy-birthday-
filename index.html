<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Babydoll 🌸</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #b57edc, #c77dff, #e0aaff);
      color: white;
      text-align: center;
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      margin-bottom: 18px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    p {
      font-size: 1.2rem;
      margin-top: 20px;
      min-height: 32px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    button {
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    button:hover {
      transform: scale(1.07);
    }

    .yes-btn {
      background: white;
      color: #8a2be2;
    }

    .no-btn {
      background: #ffe066;
      color: #6a1b9a;
    }

    .message {
      margin-top: 28px;
      font-size: 1.4rem;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .party {
      font-size: 3rem;
      margin-top: 16px;
      animation: pop 0.7s ease infinite alternate;
    }

    @keyframes pop {
      from { transform: scale(1); }
      to { transform: scale(1.12); }
    }

    .flower {
      position: fixed;
      top: -40px;
      font-size: 24px;
      opacity: 0.9;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="flowers"></div>

  <div class="container">
    <h1>Will you cry on your birthday babydoll ?</h1>

    <div class="buttons">
      <button class="yes-btn" onclick="showYes()">Yes</button>
      <button class="no-btn" onclick="showNo()">No</button>
    </div>

    <div class="message" id="message"></div>
    <div class="party" id="party"></div>
  </div>

  <script>
    function showYes() {
      document.getElementById("message").textContent = "oui";
      document.getElementById("party").textContent = "";
    }

    function showNo() {
      document.getElementById("message").textContent = "that's what I want to hear";
      document.getElementById("party").textContent = "🎉🥳🎂🎊💜";
    }

    const flowersContainer = document.getElementById("flowers");
    const flowerEmojis = ["🌸", "🌷", "💮", "🌺", "🌼"];

    for (let i = 0; i < 28; i++) {
      const flower = document.createElement("div");
      flower.className = "flower";
      flower.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
      flower.style.left = Math.random() * 100 + "vw";
      flower.style.animationDuration = (6 + Math.random() * 8) + "s";
      flower.style.animationDelay = Math.random() * 8 + "s";
      flower.style.fontSize = (18 + Math.random() * 22) + "px";
      flowersContainer.appendChild(flower);
    }
  </script>
</body>
</html>
