<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Babydoll 🌸</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(135deg, #b57edc, #c77dff, #e0aaff);
  color: white;
  text-align: center;
}

.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

button {
  padding: 15px 25px;
  font-size: 16px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin: 10px;
}

.yes-btn {
  position: absolute;
  background: white;
  color: purple;
}

.no-btn {
  background: #ffe066;
  color: #6a1b9a;
}

.message {
  margin-top: 30px;
  font-size: 22px;
  font-weight: bold;
}

.party {
  font-size: 40px;
  margin-top: 10px;
  animation: pop 0.6s infinite alternate;
}

@keyframes pop {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* fleurs */
.flower {
  position: fixed;
  top: -40px;
  font-size: 24px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div id="flowers"></div>

<div class="container">
  <h1>Will you cry on your birthday babydoll ?</h1>

  <button class="yes-btn" id="yesBtn">Yes</button>
  <button class="no-btn" onclick="showNo()">No</button>

  <div class="message" id="message"></div>
  <div class="party" id="party"></div>
</div>

<script>

// 🎯 bouton qui fuit
const yesBtn = document.getElementById("yesBtn");

yesBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  yesBtn.style.left = x + "px";
  yesBtn.style.top = y + "px";
});

// ❌ impossible de cliquer
yesBtn.addEventListener("click", (e) => {
  e.preventDefault();
});

// ✅ bouton NO
function showNo() {
  document.getElementById("message").textContent = "that's what I want to hear";
  document.getElementById("party").textContent = "🎉🥳🎂💜";
}

// 🌸 fleurs qui tombent
const flowers = document.getElementById("flowers");
const emojis = ["🌸","🌷","🌺","💮","🌼"];

for (let i = 0; i < 30; i++) {
  const f = document.createElement("div");
  f.className = "flower";
  f.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (5 + Math.random()*7) + "s";
  f.style.fontSize = (18 + Math.random()*20) + "px";
  flowers.appendChild(f);
}

</script>

</body>
</html>
