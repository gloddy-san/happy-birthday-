<script>
  const yesBtn = document.getElementById("yesBtn");
  let floating = false;

  function startFloatingButton() {
    if (floating) return;
    floating = true;

    const rect = yesBtn.getBoundingClientRect();
    yesBtn.style.position = "fixed";
    yesBtn.style.left = rect.left + "px";
    yesBtn.style.top = rect.top + "px";
  }

  document.addEventListener("mousemove", (e) => {
    const rect = yesBtn.getBoundingClientRect();

    const btnX = rect.left + rect.width / 2;
    const btnY = rect.top + rect.height / 2;

    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const dx = btnX - mouseX;
    const dy = btnY - mouseY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    const threshold = 170;

    if (distance < threshold) {
      startFloatingButton();

      const safeDistance = Math.max(distance, 1);
      const force = ((threshold - safeDistance) / threshold) * 220;

      const moveX = (dx / safeDistance) * force;
      const moveY = (dy / safeDistance) * force;

      let newX = rect.left + moveX;
      let newY = rect.top + moveY;

      const margin = 12;
      const maxX = window.innerWidth - rect.width - margin;
      const maxY = window.innerHeight - rect.height - margin;

      newX = Math.max(margin, Math.min(maxX, newX));
      newY = Math.max(margin, Math.min(maxY, newY));

      yesBtn.style.left = newX + "px";
      yesBtn.style.top = newY + "px";
    }
  });

  yesBtn.addEventListener("click", (e) => {
    e.preventDefault();
  });

  function showNo() {
    document.getElementById("message").textContent = "that's what I want to hear IN sana 7ilwa jidan";
    document.getElementById("party").textContent = "🎉🥳🎂💜";

    const music = document.getElementById("bgMusic");

    music.pause();
    music.currentTime = 13;

    music.onloadedmetadata = () => {
      music.currentTime = 13;
      music.play();
    };

    music.play().catch(() => {});
  }

  const flowers = document.getElementById("flowers");
  const emojis = [
    "🌸","🌷","🌺","🌼",
    "🌹","💐","🌻",
    "💜","✨","⭐",
    "🍷","🍾","🥂","🥃"
  ];

  for (let i = 0; i < 45; i++) {
    const f = document.createElement("div");
    f.className = "flower";
    f.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    f.style.left = Math.random() * 100 + "vw";
    f.style.animationDuration = (5 + Math.random() * 8) + "s";
    f.style.animationDelay = Math.random() * 5 + "s";
    f.style.fontSize = (16 + Math.random() * 24) + "px";
    flowers.appendChild(f);
  }
</script>
